name: Bug report
description: Report a reproducible problem in remote-monitor.
title: 'fix(area): '
labels:
  - 'type:bug'
  - 'status:needs-triage'
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact command, flags, SSH target shape, and terminal context if relevant.
      placeholder: |
        1. Run ...
        2. Connect to ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: local-environment
    attributes:
      label: Local environment
      placeholder: 'macOS 15, iTerm2, Go 1.26, etc.'
  - type: input
    id: remote-environment
    attributes:
      label: Remote host environment
      placeholder: 'Ubuntu 24.04, Bash 5.2, NVIDIA GPU, etc.'
  - type: textarea
    id: logs
    attributes:
      label: Logs or terminal output
      render: text
