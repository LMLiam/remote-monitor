version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns:
          - '*'
      go-module-security:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - area:tooling
      - type:deps
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - '*'
      github-actions-security:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - area:tooling
      - security
      - type:deps
