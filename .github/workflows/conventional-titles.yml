name: Conventional Titles

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: Validate Pull Request Title
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash .github/scripts/validate-conventional-title.sh "$PR_TITLE"

  commit-subjects:
    name: Validate Commit Subjects
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Collect pull request commit subjects
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMITS_URL: ${{ github.event.pull_request.commits_url }}
        run: |
          gh api --paginate "$COMMITS_URL" --jq '.[].commit.message | split("\n")[0]' > commit-subjects.txt

      - name: Collect pushed commit subjects
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git log --format=%s "$HEAD_SHA" > commit-subjects.txt
          elif git merge-base --is-ancestor "$BEFORE_SHA" "$HEAD_SHA" 2>/dev/null; then
            git log --format=%s "$BEFORE_SHA..$HEAD_SHA" > commit-subjects.txt
          else
            git log --format=%s "$HEAD_SHA" > commit-subjects.txt
          fi

      - name: Validate commit subjects
        run: bash .github/scripts/validate-conventional-title.sh --stdin < commit-subjects.txt
