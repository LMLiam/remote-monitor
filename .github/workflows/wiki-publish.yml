# One-way wiki sync: repository wiki/ content is published to the GitHub wiki,
# and direct GitHub wiki UI edits can be overwritten by the next sync.
# Before the first run, initialize the wiki git backend by creating any page in
# the GitHub UI. If GITHUB_TOKEN cannot push to the wiki in this repository, set
# WIKI_PUSH_TOKEN to a narrowly scoped PAT or GitHub App token instead.

name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki-publish.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Wiki
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync wiki content
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          wiki_url="https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          # The wiki repository exists only after a maintainer creates an
          # initial page in the GitHub UI.
          if ! git clone "${wiki_url}" wiki-repo; then
            echo "::error::Unable to clone ${GITHUB_REPOSITORY}.wiki.git. Initialize the wiki in the GitHub UI first."
            exit 1
          fi

          # Replace published wiki files while preserving the clone metadata.
          find wiki-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a wiki/. wiki-repo/

          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Avoid empty commits when repository content already matches the wiki.
          if [ -z "$(git status --porcelain)" ]; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git add -A
          git commit -m "docs(wiki): sync repository wiki"
          git push
