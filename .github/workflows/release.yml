name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GORELEASER_VERSION: v2.16.0
  SYFT_VERSION: v1.38.0

jobs:
  prepare-release:
    name: Prepare Manual Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.main.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Require main workflow ref
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Manual releases must be dispatched from main, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Resolve latest main
        id: main
        run: |
          git fetch origin main --tags --force
          main_sha="$(git rev-parse origin/main)"
          head_sha="$(git rev-parse HEAD)"
          if [ "$head_sha" != "$main_sha" ]; then
            echo "Checked out ${head_sha}, but origin/main is ${main_sha}"
            exit 1
          fi
          echo "sha=${main_sha}" >> "$GITHUB_OUTPUT"

      - name: Verify latest main checks
        env:
          CHECK_WAIT_TIMEOUT_SECONDS: 900
          CHECK_WAIT_INTERVAL_SECONDS: 20
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/verify-main-checks.sh "${{ steps.main.outputs.sha }}"

      - name: Compute release tag
        id: version
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
        run: |
          mapfile -t tags < <(git tag --list 'v*.*.*')
          tag="$(bash .github/scripts/next-release-tag.sh "$RELEASE_BUMP" "${tags[@]}")"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Release tag already exists: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ steps.main.outputs.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$RELEASE_SHA" -m "remote-monitor ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Summarize release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ steps.main.outputs.sha }}
        run: echo "Prepared ${RELEASE_TAG} at ${RELEASE_SHA}"

  release:
    name: Tagged Release
    needs: prepare-release
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || needs.prepare-release.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      attestations: write
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GoReleaser
        run: go install "github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}"

      - name: Install Syft
        run: go install "github.com/anchore/syft/cmd/syft@${SYFT_VERSION}"

      - name: Check GoReleaser config
        run: goreleaser check

      - name: Check Homebrew tap credentials
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: test -n "$TAP_GITHUB_TOKEN"

      - name: Publish GitHub release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}

      - name: Prepare release metadata
        id: release-metadata
        run: |
          version="${RELEASE_TAG#v}"
          checksums="dist/remote-monitor_${version}_checksums.txt"
          test -f "$checksums"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "checksums=$checksums" >> "$GITHUB_OUTPUT"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-checksums: ${{ steps.release-metadata.outputs.checksums }}

      - name: Publish generated release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_args=("repos/${GITHUB_REPOSITORY}/releases/generate-notes")
          notes_args+=(-f "tag_name=${RELEASE_TAG}")

          previous_tag="$(git tag --sort=-version:refname | awk -v current="$RELEASE_TAG" '
            $0 == current { found = 1; next }
            found { print; exit }
          ')"
          if [ -n "$previous_tag" ]; then
            notes_args+=(-f "previous_tag_name=${previous_tag}")
          fi

          gh api "${notes_args[@]}" --jq .body > release-notes.md
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md

      - name: Publish Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          test -n "$TAP_GITHUB_TOKEN"
          checksums="dist/remote-monitor_${RELEASE_VERSION}_checksums.txt"
          test -f "$checksums"

          tap_dir="$(mktemp -d)"
          auth_header="$(printf 'x-access-token:%s' "$TAP_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            clone https://github.com/LMLiam/homebrew-tap.git "$tap_dir"

          scripts/homebrew/generate-formula.sh \
            "$RELEASE_TAG" \
            "$checksums" \
            "$tap_dir/Formula/remote-monitor.rb"

          git -C "$tap_dir" config user.name "LMLiam"
          git -C "$tap_dir" config user.email "46268350+TheRealEmissions@users.noreply.github.com"
          git -C "$tap_dir" add Formula/remote-monitor.rb
          if git -C "$tap_dir" diff --cached --quiet; then
            echo "Homebrew formula already up to date"
            exit 0
          fi

          git -C "$tap_dir" commit -m "brew(remote-monitor): update to ${RELEASE_TAG}"
          git -C "$tap_dir" \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin HEAD:main
