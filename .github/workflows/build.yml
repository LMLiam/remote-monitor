name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  SHELLCHECK_IMAGE: docker.io/koalaman/shellcheck:v0.11.0
  SHFMT_VERSION: v3.13.1

jobs:
  go:
    name: Go Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l ./cmd ./internal ./tests)"
          if [ -n "$unformatted" ]; then
            echo "Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check shell formatting
        run: go run "mvdan.cc/sh/v3/cmd/shfmt@${SHFMT_VERSION}" -i 2 -ci -d .github/scripts internal/transport/sampler internal/transport/sampler.sh tests/e2e/ssh-target

      - name: ShellCheck
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt "${SHELLCHECK_IMAGE}" --version
          docker run --rm -v "$PWD:/mnt" -w /mnt "${SHELLCHECK_IMAGE}" \
            -S warning -s bash \
            .github/scripts/*.sh \
            tests/e2e/ssh-target/*.sh \
            internal/transport/sampler.sh
          # Sampler modules are Bash fragments sourced into sampler.sh. Checked
          # directly, cross-module reads and writes look unused or unassigned.
          docker run --rm -v "$PWD:/mnt" -w /mnt "${SHELLCHECK_IMAGE}" \
            -S warning -s bash -e SC2034,SC2154 \
            internal/transport/sampler/*.sh

      - name: Test conventional title validator
        run: bash .github/scripts/test-conventional-title.sh

      - name: Test release helper scripts
        run: |
          bash .github/scripts/test-next-release-tag.sh
          bash .github/scripts/test-verify-main-checks.sh

      - name: Vet
        run: go vet -tags=integration ./...

      - name: Test
        run: go test -tags=integration ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          args: --build-tags=integration

      - name: Compile
        run: go build -o remote-monitor ./cmd/remote-monitor
